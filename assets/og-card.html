<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>emojify · og card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* ─── 1200×630 social card — screenshot target, not a site page ─── */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    position:relative;
    background:#0a0912;
    font-family:'Fraunces',serif;
  }
  /* subtle radial glow behind the scene */
  .glow{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 700px 390px at 50% 40%, rgba(231,163,43,.09), transparent 68%);
  }
  /* faint starfield — chrome recedes */
  .star{position:absolute;border-radius:50%;background:#f4ead2}
  .s1{width:2px;height:2px;left:148px;top:96px;opacity:.32}
  .s2{width:1.5px;height:1.5px;left:316px;top:208px;opacity:.20}
  .s3{width:2px;height:2px;left:1042px;top:128px;opacity:.28}
  .s4{width:1.5px;height:1.5px;left:898px;top:64px;opacity:.18}
  .s5{width:2px;height:2px;left:1118px;top:330px;opacity:.22}
  .s6{width:1.5px;height:1.5px;left:76px;top:392px;opacity:.20}
  .s7{width:2px;height:2px;left:584px;top:74px;opacity:.24}
  .s8{width:1.5px;height:1.5px;left:208px;top:540px;opacity:.16}
  .s9{width:1.5px;height:1.5px;left:986px;top:548px;opacity:.16}
  .s10{width:1.5px;height:1.5px;left:702px;top:170px;opacity:.18}

  .stack{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;
    padding-top:108px;
  }
  /* ─── wordmark — mirrors index.html .brand ─── */
  .brand{
    font-family:'Fraunces',serif;font-weight:700;
    font-size:120px;line-height:1;
    color:#f4ead2;letter-spacing:-.01em;
  }
  .brand .y{color:#e7a32b}
  .brand .dot{
    display:inline-block;width:.2em;height:.2em;border-radius:50%;
    background:#ef8a5d;margin-left:.04em;vertical-align:.1em;
  }
  /* ─── tagline ─── */
  .tagline{
    margin-top:34px;
    font-family:'JetBrains Mono',monospace;font-weight:500;
    font-size:21px;letter-spacing:.46em;text-indent:.46em;
    text-transform:uppercase;color:#9a8f78;
  }
  /* ─── emoji band — the heroes ─── */
  .band{
    position:absolute;left:0;right:0;top:392px;
    display:grid;grid-template-columns:1fr auto 1fr;
    align-items:center;
  }
  .band .side{display:flex;align-items:center;gap:44px}
  .band .left{justify-content:flex-end;padding-right:48px}
  .band .right{justify-content:flex-start;padding-left:48px}
  .band span{display:block;line-height:1}
  .e96{font-size:96px}
  .e118{font-size:118px}
  .hero{font-size:172px;filter:drop-shadow(0 0 30px rgba(231,163,43,.22))}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="star s1"></div><div class="star s2"></div><div class="star s3"></div>
  <div class="star s4"></div><div class="star s5"></div><div class="star s6"></div>
  <div class="star s7"></div><div class="star s8"></div><div class="star s9"></div>
  <div class="star s10"></div>

  <div class="stack">
    <div class="brand">emoji<span class="y">f</span>y<span class="dot"></span></div>
    <div class="tagline">a galaxy of emoji</div>
  </div>

  <div class="band">
    <div class="side left"><span class="e96">🔑</span><span class="e118">💬</span></div>
    <span class="hero">😀</span>
    <div class="side right"><span class="e118">🎮</span><span class="e118">🔥</span><span class="e96">🧱</span></div>
  </div>
</body>
</html>
