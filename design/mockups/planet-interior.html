<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>emojify — inside a planet (Messenger-style, immersive)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2c2a23;--ink-soft:#5f5848;--honey:#d8961f;--mono:'JetBrains Mono',monospace;--serif:'Fraunces',serif}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#bfe6f6}
  #app{position:fixed;inset:0}canvas{display:block}
  .ui{position:fixed;inset:0;pointer-events:none;z-index:5}
  .top{position:absolute;top:22px;left:0;right:0;text-align:center}
  .top .ey{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:#5d6a72;text-shadow:0 1px 4px rgba(255,255,255,.4)}
  .top h1{font-family:var(--serif);font-weight:700;font-size:1.6rem;color:#23303a;margin-top:3px;text-shadow:0 1px 8px rgba(255,255,255,.45)}
  .leave{position:absolute;top:22px;left:24px;pointer-events:auto;font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;color:#33424c;background:rgba(255,255,255,.7);border:1px solid rgba(80,90,100,.25);border-radius:999px;padding:8px 14px;cursor:pointer}
  .hintbar{position:absolute;bottom:22px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;color:#33424c;text-shadow:0 1px 6px rgba(255,255,255,.4)}
  .hintbar b{color:var(--honey)}
  .prompt{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .2s;
    font-family:var(--mono);font-size:.72rem;color:#2c2a23;background:rgba(255,251,240,.96);border:1px solid #e7d9b4;border-radius:999px;padding:8px 14px;white-space:nowrap;box-shadow:0 10px 24px -10px rgba(0,0,0,.4)}
  .prompt.on{opacity:1}
  #tool{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;background:radial-gradient(120% 100% at 50% 0%,rgba(20,16,30,.4),rgba(8,7,16,.78))}
  #tool.on{opacity:1;pointer-events:auto}
  .tcard{width:min(520px,92vw);background:rgba(255,251,240,.98);border:1px solid #ecdcb6;border-radius:22px;padding:26px 28px;text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.55)}
  .tcard .ey{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#8a8270}
  .tcard h2{font-family:var(--serif);font-weight:700;font-size:1.6rem;margin:6px 0 14px}
  .tt{width:100%;font-family:var(--serif);font-size:1.05rem;border:1.5px solid #e7dcc6;border-radius:12px;padding:12px 14px;resize:none;background:#fffdf8;color:#2c2a23}
  .tbtn{margin-top:12px;font-family:var(--mono);font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;padding:11px 18px;border-radius:12px;border:1.5px solid #2c2a23;background:#e7a32b;color:#2b2113;box-shadow:2px 2px 0 #2c2a23;cursor:pointer}
  .tbtn:active{transform:translate(2px,2px);box-shadow:0 0 0}
  .tout{min-height:2em;margin-top:16px;font-size:2rem;letter-spacing:.06em}
  .tclose{margin-top:18px;display:block;width:100%;font-family:var(--mono);font-size:.68rem;color:#5f5848;background:#fff;border:1px solid #e7dcc6;border-radius:999px;padding:9px;cursor:pointer}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;font-family:var(--mono);font-size:.8rem;letter-spacing:.1em;color:#33424c;background:#bfe6f6}
</style>
</head>
<body>
<div id="loading">landing…</div>
<div id="app"></div>
<div class="ui">
  <button class="leave" id="leave">← leave to the galaxy</button>
  <div class="top"><div class="ey">you have landed on</div><h1>Translation Bureau</h1></div>
  <div class="prompt" id="prompt">▸ press <b>space</b> to use the Translator</div>
  <div class="hintbar">walk with <b>↑</b> · turn with <b>← →</b> (or WASD) · reach the <b>🏤 post office</b></div>
</div>
<div id="tool"><div class="tcard">
  <div class="ey">translator kiosk</div><h2>say it in emoji</h2>
  <textarea class="tt" id="tt" rows="2">I am so proud of you</textarea>
  <button class="tbtn" id="tgo">translate to emoji →</button>
  <div class="tout" id="tout"></div>
  <button class="tclose" id="tclose">← back to the planet</button>
</div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

let W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));renderer.setSize(W,H);
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;renderer.outputColorSpace=THREE.SRGBColorSpace;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene();
// warm dawn sky (sky-sphere so it surrounds you on the surface)
const skyTex=(function(){const c=document.createElement('canvas');c.width=2;c.height=512;const g=c.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,512);gr.addColorStop(0,'#aedcf3');gr.addColorStop(.5,'#d8eef2');gr.addColorStop(.8,'#fcefda');gr.addColorStop(1,'#ffdcb4');
  g.fillStyle=gr;g.fillRect(0,0,2,512);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;})();
const sky=new THREE.Mesh(new THREE.SphereGeometry(180,32,16),new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,fog:false}));scene.add(sky);
scene.fog=new THREE.Fog(0xeaf0ea,42,120);

const camera=new THREE.PerspectiveCamera(62,W/H,0.1,400);
const R=26; // bigger planet → gentle curved horizon (you feel ON it, not above a marble)

const hemi=new THREE.HemisphereLight(0xdff1ff,0xeae0bf,0.9);scene.add(hemi);
const sun=new THREE.DirectionalLight(0xfff0cc,1.9);sun.position.set(30,50,20);scene.add(sun);

// ── sprite helpers ──
const sc={};
function tex(e,px=256){if(sc[e])return sc[e];const c=document.createElement('canvas');c.width=c.height=px;const x=c.getContext('2d');x.font=(px*0.8)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(e,px/2,px/2+px*0.04);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;t.anisotropy=8;sc[e]=t;return t;}
function emo(e,scale){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex(e),transparent:true,depthTest:true,depthWrite:false,fog:true}));s.scale.setScalar(scale);return s;}

// ── the planet (static; the AVATAR walks over it) — hilly, vertex-colored terrain ──
const planet=new THREE.Group();scene.add(planet);
const geo=new THREE.IcosahedronGeometry(R,24);
const AX=[new THREE.Vector3(1,.3,.2),new THREE.Vector3(-.4,1,.5),new THREE.Vector3(.2,-.6,1)].map(a=>a.normalize());
function hill(d){return Math.sin(d.dot(AX[0])*4.0)*0.5+Math.sin(d.dot(AX[1])*7.0+1.0)*0.28+Math.sin(d.dot(AX[2])*11.0+2.0)*0.16;}
const pos=geo.attributes.position,v=new THREE.Vector3(),colors=[];
const cGrass=new THREE.Color(0x8ccb6a),cGrass2=new THREE.Color(0x6fb45b),cMeadow=new THREE.Color(0xb8db7e),cSand=new THREE.Color(0xe7d39a);
for(let i=0;i<pos.count;i++){v.fromBufferAttribute(pos,i);const d=v.clone().normalize();const h=hill(d);v.copy(d).multiplyScalar(R+h*1.4);pos.setXYZ(i,v.x,v.y,v.z);
  let col=h>0.35?cMeadow:(h<-0.25?cSand:(Math.random()<0.5?cGrass:cGrass2));colors.push(col.r,col.g,col.b);}
geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));geo.computeVertexNormals();
planet.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:1,flatShading:true})));
function ground(dir){return R+hill(dir)*1.4;} // surface radius along a direction

// ── props on the surface (denser, themed; placed on the hilly ground) ──
const PROP=['🌳','🌲','🌳','🌸','🌻','🏠','📮','🪧','🍄','🌷','🪻','🌿','🏮','⛩️','🌳','🐑','🌲','🌼'];
const golden=Math.PI*(3-Math.sqrt(5)),NP=120;
for(let i=0;i<NP;i++){const y=1-(i/(NP-1))*2,r=Math.sqrt(1-y*y),th=golden*i;
  const d=new THREE.Vector3(Math.cos(th)*r,y,Math.sin(th)*r);const z=1.4+Math.random()*1.2;
  const sp=emo(PROP[i%PROP.length],z);sp.position.copy(d).multiplyScalar(ground(d)+z*0.42);planet.add(sp);}
// residents
const residents=[];['🙂','😀','🐤','🐰','🦊','🐢','🧒','👵'].forEach((e,i)=>{const a=Math.random()*6.28,el=Math.random()*0.8-0.1;const d=new THREE.Vector3(Math.cos(a)*Math.cos(el),Math.sin(el),Math.sin(a)*Math.cos(el)).normalize();const sp=emo(e,1.6);planet.add(sp);residents.push({sp,d,base:ground(d)+0.7,ph:Math.random()*6.28});});
// floating clouds
const clouds=[];for(let i=0;i<7;i++){const a=Math.random()*6.28,el=0.3+Math.random()*0.5;const d=new THREE.Vector3(Math.cos(a)*Math.cos(el),Math.sin(el),Math.sin(a)*Math.cos(el)).normalize();const sp=emo('☁️',4+Math.random()*3);sp.position.copy(d).multiplyScalar(R+10+Math.random()*8);scene.add(sp);clouds.push({sp,d});}

// ── KIOSK: a post office you walk to ──
const kioskDir=new THREE.Vector3(0.25,0.12,1).normalize();
const kiosk=emo('🏤',3.2);kiosk.position.copy(kioskDir).multiplyScalar(ground(kioskDir)+3.2*0.42);planet.add(kiosk);
const kSign=emo('💬',1.6);kSign.position.copy(kioskDir).multiplyScalar(ground(kioskDir)+2.6);planet.add(kSign);

// ── AVATAR walks the surface; CLOSE chase-cam behind it (Messenger feel) ──
const avatar=emo('🧑‍🚀',2.6);scene.add(avatar);
const shadow=new THREE.Mesh(new THREE.CircleGeometry(1.0,24),new THREE.MeshBasicMaterial({color:0x33502f,transparent:true,opacity:0.28}));scene.add(shadow);
let posDir=new THREE.Vector3(0,0.15,1).normalize();           // where on the sphere you stand
let heading=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0),posDir).normalize(); // tangent forward
const camPos=new THREE.Vector3(),camTgt=new THREE.Vector3();
function placeCamera(initial){
  const up=posDir.clone();
  const aPos=posDir.clone().multiplyScalar(ground(posDir)+1.0);
  avatar.position.copy(aPos).addScaledVector(up,1.0);
  shadow.position.copy(posDir).multiplyScalar(ground(posDir)+0.05);
  const n=posDir.clone(); shadow.lookAt(shadow.position.clone().add(n));
  const tgt=aPos.clone().addScaledVector(heading,11).addScaledVector(up,-0.4);
  const cp=aPos.clone().addScaledVector(heading,-7).addScaledVector(up,5.4);
  if(initial){camPos.copy(cp);camTgt.copy(tgt);}else{camPos.lerp(cp,0.12);camTgt.lerp(tgt,0.14);}
  camera.up.copy(up);camera.position.copy(camPos);camera.lookAt(camTgt);
}

// input
const keys={};
addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(e.key===' '){e.preventDefault();if(nearKiosk)document.getElementById('tool').classList.add('on');}if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
let nearKiosk=false;const promptEl=document.getElementById('prompt');
function walk(dt){
  const turn=1.6*dt, move=0.9*dt;
  if(keys['arrowleft']||keys['a'])heading.applyAxisAngle(posDir,turn);
  if(keys['arrowright']||keys['d'])heading.applyAxisAngle(posDir,-turn);
  let f=0; if(keys['arrowup']||keys['w'])f=move; if(keys['arrowdown']||keys['s'])f=-move*0.6;
  if(f){const axis=new THREE.Vector3().crossVectors(posDir,heading).normalize();const q=new THREE.Quaternion().setFromAxisAngle(axis,f);posDir.applyQuaternion(q);heading.applyQuaternion(q);posDir.normalize();heading.crossVectors(new THREE.Vector3().crossVectors(posDir,heading),posDir).normalize();}
}

// tool / leave
document.getElementById('tclose').onclick=()=>document.getElementById('tool').classList.remove('on');
document.getElementById('tgo').onclick=()=>document.getElementById('tout').textContent='🥹👏❤️✨🫶';
document.getElementById('leave').onclick=()=>alert('(wires back to the galaxy dive-out)');

const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),0.14,0.5,0.95));composer.addPass(new OutputPass());

const clock=new THREE.Clock();document.getElementById('loading').style.display='none';
placeCamera(true);
const kw=new THREE.Vector3();
function animate(){const dt=Math.min(0.05,clock.getDelta()),t=clock.elapsedTime;
  walk(dt);placeCamera(false);
  avatar.position.y+=Math.sin(t*3)*0.05;
  residents.forEach(r=>r.sp.position.copy(r.d).multiplyScalar(r.base+Math.sin(t*1.6+r.ph)*0.12));
  clouds.forEach((c,i)=>{c.d.applyAxisAngle(new THREE.Vector3(0,1,0),dt*0.02);c.sp.position.copy(c.d).multiplyScalar(R+12+i);});
  kiosk.getWorldPosition(kw);nearKiosk=kw.distanceTo(avatar.position)<6 && !document.getElementById('tool').classList.contains('on');
  promptEl.classList.toggle('on',nearKiosk);
  composer.render();requestAnimationFrame(animate);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);composer.setSize(W,H);});
</script>
</body>
</html>
