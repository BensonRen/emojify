<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>emojify — inside a planet (Messenger-style)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2c2a23;--ink-soft:#5f5848;--honey:#d8961f;--mono:'JetBrains Mono',monospace;--serif:'Fraunces',serif}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#cfe7f5}
  #app{position:fixed;inset:0}canvas{display:block}
  .ui{position:fixed;inset:0;pointer-events:none;z-index:5}
  .top{position:absolute;top:24px;left:0;right:0;text-align:center}
  .top .ey{font-family:var(--mono);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#6b6655}
  .top h1{font-family:var(--serif);font-weight:700;font-size:1.7rem;color:#2c2a23;margin-top:4px}
  .leave{position:absolute;top:24px;left:26px;pointer-events:auto;font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;color:#4a4436;background:rgba(255,253,247,.85);border:1px solid #d9cdb2;border-radius:999px;padding:8px 14px;cursor:pointer}
  .hintbar{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;color:#4a4436}
  .hintbar b{color:var(--honey)}
  .prompt{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .2s;
    font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;color:#2c2a23;background:rgba(255,251,240,.95);border:1px solid #e7d9b4;border-radius:999px;padding:8px 14px;white-space:nowrap;box-shadow:0 8px 20px -10px rgba(120,90,30,.5)}
  .prompt.on{opacity:1}
  /* tool overlay */
  #tool{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;background:radial-gradient(120% 100% at 50% 0%,rgba(20,16,30,.45),rgba(8,7,16,.8))}
  #tool.on{opacity:1;pointer-events:auto}
  .tcard{width:min(520px,92vw);background:rgba(255,251,240,.98);border:1px solid #ecdcb6;border-radius:22px;padding:26px 28px;text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.55)}
  .tcard .ey{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#8a8270}
  .tcard h2{font-family:var(--serif);font-weight:700;font-size:1.6rem;margin:6px 0 14px}
  .tt{width:100%;font-family:var(--serif);font-size:1.05rem;border:1.5px solid #e7dcc6;border-radius:12px;padding:12px 14px;resize:none;background:#fffdf8;color:#2c2a23}
  .tbtn{margin-top:12px;font-family:var(--mono);font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;padding:11px 18px;border-radius:12px;border:1.5px solid #2c2a23;background:#e7a32b;color:#2b2113;box-shadow:2px 2px 0 #2c2a23;cursor:pointer}
  .tbtn:active{transform:translate(2px,2px);box-shadow:0 0 0}
  .tout{min-height:2em;margin-top:16px;font-size:2rem;letter-spacing:.06em}
  .tclose{margin-top:18px;display:block;width:100%;font-family:var(--mono);font-size:.68rem;color:#5f5848;background:#fff;border:1px solid #e7dcc6;border-radius:999px;padding:9px;cursor:pointer}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;font-family:var(--mono);font-size:.8rem;letter-spacing:.1em;color:#5f5848;background:#cfe7f5}
</style>
</head>
<body>
<div id="loading">landing…</div>
<div id="app"></div>
<div class="ui">
  <button class="leave" id="leave">← leave to the galaxy</button>
  <div class="top"><div class="ey">you have landed on</div><h1>Translation Bureau</h1></div>
  <div class="prompt" id="prompt">▸ press <b>space</b> to use the Translator</div>
  <div class="hintbar">walk with <b>← ↑ → ↓</b> / WASD · find the <b>💬 translator kiosk</b></div>
</div>
<div id="tool"><div class="tcard">
  <div class="ey">translator kiosk</div><h2>say it in emoji</h2>
  <textarea class="tt" id="tt" rows="2">I am so proud of you</textarea>
  <button class="tbtn" id="tgo">translate to emoji →</button>
  <div class="tout" id="tout"></div>
  <button class="tclose" id="tclose">← back to the planet</button>
</div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

let W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));renderer.setSize(W,H);
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.04;renderer.outputColorSpace=THREE.SRGBColorSpace;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene();
// cozy warm-dawn sky
(function(){const c=document.createElement('canvas');c.width=2;c.height=512;const g=c.getContext('2d');
  const gr=g.createLinearGradient(0,0,0,512);gr.addColorStop(0,'#bfe6f6');gr.addColorStop(.45,'#e4f1f3');gr.addColorStop(.78,'#fdf3df');gr.addColorStop(1,'#ffe6c8');
  g.fillStyle=gr;g.fillRect(0,0,2,512);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;scene.background=t;})();
scene.fog=new THREE.Fog(0xf3ead6,28,60);

const camera=new THREE.PerspectiveCamera(46,W/H,0.1,200);
const R=9; // planet radius
camera.position.set(0,R+7.5,18);camera.lookAt(0,R*0.35,0);

const hemi=new THREE.HemisphereLight(0xdff1ff,0xfff0cf,0.95);scene.add(hemi);
const sun=new THREE.DirectionalLight(0xfff1cc,1.8);sun.position.set(8,16,10);scene.add(sun);

// ── sprite helpers ──
const sc={};
function tex(e,px=256){if(sc[e])return sc[e];const c=document.createElement('canvas');c.width=c.height=px;const x=c.getContext('2d');x.font=(px*0.8)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(e,px/2,px/2+px*0.04);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;t.anisotropy=8;sc[e]=t;return t;}
function emo(e,scale){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex(e),transparent:true,depthTest:true,depthWrite:false}));s.scale.setScalar(scale);return s;}

// ── the tiny planet (rotates beneath the fixed avatar = "walking") ──
const planet=new THREE.Group();scene.add(planet);
const ball=new THREE.Mesh(new THREE.IcosahedronGeometry(R,4),new THREE.MeshStandardMaterial({color:0x8fd07a,roughness:1,flatShading:true}));
planet.add(ball);
// a faint "sea" tint sphere just under the surface for silhouette depth
planet.add(new THREE.Mesh(new THREE.IcosahedronGeometry(R*0.99,3),new THREE.MeshStandardMaterial({color:0x5fae6a,roughness:1,flatShading:true})));

// surface decorations (emoji "vegetation"/residents) — children of planet so they ride the surface
const DECO=['🌳','🌲','🌸','🌻','🏠','🪧','💬','🍄','🌷','🐑','🌿','🪻'];
const golden=Math.PI*(3-Math.sqrt(5));const NDECO=46;
for(let i=0;i<NDECO;i++){const y=1-(i/(NDECO-1))*2,r=Math.sqrt(1-y*y),th=golden*i;
  const dir=new THREE.Vector3(Math.cos(th)*r,y,Math.sin(th)*r);const z=1.0+Math.random()*0.9;
  const sp=emo(DECO[i%DECO.length],z);sp.position.copy(dir).multiplyScalar(R+z*0.42);planet.add(sp);}

// the KIOSK (walk here to use the tool) — a known spot on the surface
const kioskDir=new THREE.Vector3(0.2,0.1,1).normalize();
const kiosk=emo('💬',2.0);kiosk.position.copy(kioskDir).multiplyScalar(R+0.9);planet.add(kiosk);
const kioskRing=new THREE.Sprite(new THREE.SpriteMaterial({map:(function(){const px=128,c=document.createElement('canvas');c.width=c.height=px;const x=c.getContext('2d');const g=x.createRadialGradient(px/2,px/2,4,px/2,px/2,px/2);g.addColorStop(0,'rgba(255,201,84,.9)');g.addColorStop(.5,'rgba(255,201,84,.3)');g.addColorStop(1,'rgba(255,201,84,0)');x.fillStyle=g;x.beginPath();x.arc(px/2,px/2,px/2,0,7);x.fill();return new THREE.CanvasTexture(c);})(),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
kioskRing.scale.setScalar(4.2);kiosk.add(kioskRing);

// ── the avatar (you) — fixed at the top of the planet, facing camera ──
const avatar=emo('🧑‍🚀',2.4);avatar.position.set(0,R+0.9,0);scene.add(avatar);
// a soft contact shadow under the avatar
const shadow=new THREE.Mesh(new THREE.CircleGeometry(1.1,24),new THREE.MeshBasicMaterial({color:0x2e5a36,transparent:true,opacity:0.25}));
shadow.rotation.x=-Math.PI/2;shadow.position.set(0,R+0.02,0);scene.add(shadow);

// ── ambient resident emoji that wander & wave ──
const residents=[];const RES=['🙂','😀','🐤','🐰','🦊'];
for(let i=0;i<5;i++){const dir=new THREE.Vector3(Math.random()-0.5,Math.random()*0.6+0.2,Math.random()-0.5).normalize();
  const sp=emo(RES[i],1.6);sp.position.copy(dir).multiplyScalar(R+0.7);planet.add(sp);residents.push({sp,ph:Math.random()*6.28,base:R+0.7,dir});}

// ── post ──
const composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),0.18,0.5,0.92));composer.addPass(new OutputPass());

// ── input: walk = rotate the planet under the avatar ──
const keys={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '){e.preventDefault();if(nearKiosk)openTool();}});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
let nearKiosk=false;const promptEl=document.getElementById('prompt');
// rotation helpers (rotate planet around camera-relative axes)
function step(dt){
  const sp=1.1*dt;
  let rx=0,ry=0;
  if(keys['arrowup']||keys['w'])rx+=sp;
  if(keys['arrowdown']||keys['s'])rx-=sp;
  if(keys['arrowleft']||keys['a'])ry+=sp;
  if(keys['arrowright']||keys['d'])ry-=sp;
  if(rx||ry){const q=new THREE.Quaternion().setFromEuler(new THREE.Euler(rx,ry,0,'XYZ'));planet.quaternion.premultiply(q);}
}

// tool overlay
const toolEl=document.getElementById('tool');
function openTool(){toolEl.classList.add('on');}
document.getElementById('tclose').onclick=()=>toolEl.classList.remove('on');
document.getElementById('tgo').onclick=()=>document.getElementById('tout').textContent='🥹👏❤️✨🫶';
document.getElementById('leave').onclick=()=>{alert('(wires back to the galaxy dive-out)');};

// ── loop ──
const clock=new THREE.Clock();document.getElementById('loading').style.display='none';
const kw=new THREE.Vector3(),aw=new THREE.Vector3(0,R+0.9,0);
function animate(){const dt=Math.min(0.05,clock.getDelta()),t=clock.elapsedTime;
  step(dt);
  // avatar idle bob + face camera (sprite already billboards)
  avatar.position.y=R+0.9+Math.sin(t*2)*0.12;
  // residents bob
  residents.forEach(r=>{r.sp.position.copy(r.dir).multiplyScalar(r.base+Math.sin(t*1.6+r.ph)*0.12);});
  // kiosk proximity (is the kiosk near the top, by the avatar?)
  kiosk.getWorldPosition(kw);nearKiosk=kw.distanceTo(aw)<3.4 && kw.y>R*0.6;
  promptEl.classList.toggle('on',nearKiosk && !toolEl.classList.contains('on'));
  composer.render();requestAnimationFrame(animate);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);composer.setSize(W,H);});
// deep-link: start near the kiosk for screenshots
if(location.hash==='#kiosk'){planet.quaternion.identity();}
</script>
</body>
</html>
