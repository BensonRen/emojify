<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Emoji or It Didn't Happen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f3ec; --surface:#faf7f2; --surface2:#f0ead8; --border:#ddd6c8;
      --border2:#c8bfb0; --text:#1c1710; --text-muted:#7a7060; --text-dim:#b8ae9e;
      --accent:#a85c20; --green:#2e6e44; --red:#9e3030;
      --serif:'Cormorant Garamond',Georgia,serif; --mono:'JetBrains Mono',monospace;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--serif);
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:24px; gap:20px; }
    header { text-align:center; }
    h1 { font-size:2rem; font-weight:700; letter-spacing:-.01em; }
    .sub { font-family:var(--mono); font-size:.72rem; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.12em; margin-top:6px; }
    .progress { font-family:var(--mono); font-size:.75rem; color:var(--text-muted);
      letter-spacing:.08em; min-height:1em; }
    .card { background:var(--surface); border:1px solid var(--border);
      border-radius:14px; width:min(560px,92vw); padding:40px 32px;
      box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 8px 30px rgba(0,0,0,.04);
      text-align:center; }
    .emoji { font-size:3.4rem; line-height:1.35; word-break:break-word; min-height:1.4em; }
    .reveal { margin-top:18px; padding-top:18px; border-top:1px dashed var(--border2); }
    .reveal.hidden { display:none; }
    .badge { display:inline-block; font-family:var(--mono); font-size:.62rem;
      text-transform:uppercase; letter-spacing:.1em; color:var(--accent);
      border:1px solid var(--border2); border-radius:999px; padding:3px 10px; margin-bottom:10px; }
    .title { font-size:1.7rem; font-weight:700; color:var(--accent); }
    .line { font-style:italic; font-size:1.15rem; color:var(--text-muted); margin-top:6px; }
    .alt { font-family:var(--mono); font-size:.7rem; color:var(--text-dim);
      margin-top:14px; letter-spacing:.04em; }
    .alt span { color:var(--text-muted); }
    .row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .pick-label { font-family:var(--mono); font-size:.72rem; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.1em; margin-bottom:18px; }
    button { font-family:var(--mono); font-size:.78rem; letter-spacing:.06em;
      text-transform:uppercase; padding:12px 20px; border-radius:10px;
      border:1px solid var(--border2); background:var(--surface2); color:var(--text);
      cursor:pointer; transition:transform .06s ease, background .15s ease; }
    button:hover { background:#e9e1cd; }
    button:active { transform:translateY(1px); }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.got { color:var(--green); border-color:var(--green); }
    button.miss { color:var(--red); border-color:var(--red); }
    button.ghost { background:transparent; color:var(--text-muted); }
    .msg { font-family:var(--mono); font-size:.85rem; color:var(--text-muted); line-height:1.6; }
    .score { font-size:2.2rem; font-weight:700; color:var(--accent); }
    /* two translations shown side by side (blind until reveal) */
    .tpair { display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap; }
    .tcell { flex:1 1 180px; min-width:150px; }
    .tpair .emoji { font-size:2.6rem; min-height:1.2em; }
    .tmeta { margin-top:12px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .tmeta.hidden { display:none; }
    .vlabel { font-family:var(--mono); font-size:.6rem; text-transform:uppercase;
      letter-spacing:.1em; color:var(--text-muted); border:1px solid var(--border);
      border-radius:999px; padding:2px 9px; }
    .thumbs { display:flex; gap:8px; }
    button.thumb { padding:6px 13px; font-size:1rem; line-height:1; }
    button.thumb.up.on { color:var(--green); border-color:var(--green); background:#e6efe8; }
    button.thumb.down.on { color:var(--red); border-color:var(--red); background:#f3e6e6; }
  </style>
</head>
<body>
  <header>
    <h1>Emoji or It Didn't Happen</h1>
    <div class="sub">guess the source from the emoji</div>
  </header>
  <div class="progress" id="progress"></div>
  <div class="card" id="card"><div class="msg" id="boot">Loading…</div></div>

  <script>
    const $ = (id) => document.getElementById(id);
    // selection: array of pack objects ({slug,name,cards}) currently in play.
    const state = { packs: [], selection: [], deck: [], idx: 0, revealed: false, got: 0, missed: 0, votes: {} };

    function shuffle(a) { // Fisher-Yates
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── Pack picker ────────────────────────────────────────────────
    function renderPicker() {
      $('progress').textContent = '';
      const multi = state.packs.length > 1;
      $('card').innerHTML = `
        <div class="pick-label">Choose a deck</div>
        <div class="row" id="picks"></div>`;
      const picks = $('picks');
      for (const p of state.packs) {
        const b = document.createElement('button');
        b.className = 'primary'; b.textContent = p.name;
        b.onclick = () => startGame([p]);
        picks.appendChild(b);
      }
      if (multi) {
        const all = document.createElement('button');
        all.textContent = 'All decks';
        all.onclick = () => startGame(state.packs.slice());
        picks.appendChild(all);
      }
    }

    // ── Deck loading ───────────────────────────────────────────────
    async function startGame(selection) {
      state.selection = selection;
      $('card').innerHTML = `<div class="msg">Shuffling…</div>`;
      try {
        const decks = await Promise.all(selection.map((p) =>
          fetch('./data/' + p.cards).then((r) => {
            if (!r.ok) throw new Error(p.cards + ' http ' + r.status);
            return r.json();
          }).then((cards) => cards.map((c) => ({ ...c, _pack: p.name })))));
        const deck = decks.flat();
        if (deck.length === 0) throw new Error('empty deck');
        state.deck = shuffle(deck);
        state.idx = 0; state.revealed = false; state.got = 0; state.missed = 0; state.votes = {};
        renderCard();
      } catch (e) {
        $('card').innerHTML = `<div class="msg">Deck failed to load.<br><small>${esc(String(e))}</small></div>
          <div class="row" style="margin-top:18px;"><button class="ghost" onclick="location.reload()">Back</button></div>`;
      }
    }

    // ── Play ───────────────────────────────────────────────────────
    // The two model translations present on a card, in a per-card randomized order
    // so their on-screen position can't leak which model is which while guessing.
    function translationsOf(c) {
      const present = [
        { model: 'minimax', label: 'minimax', emoji: c.emoji },
        { model: 'openai', label: 'gpt-4o-mini', emoji: c.emojiAlt },
      ].filter((t) => t.emoji);
      if (c._order === undefined) c._order = Math.random() < 0.5 ? 0 : 1;
      return (c._order && present.length === 2) ? [present[1], present[0]] : present;
    }
    const voteKey = (c, model) => `${c._pack}|${c.id}|${model}`;

    // Fire-and-forget: a feedback POST must never break the game (matches the
    // project's "degrade gracefully on backend hiccups" rule). Served by serve.mjs.
    function postFeedback(c, t, vote) {
      fetch('/api/feedback', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cardId: c.id, pack: c._pack, title: c.title,
          line: c.line, model: t.model, emoji: t.emoji, vote }),
      }).catch(() => {});
    }
    function vote(c, t, v) {
      const k = voteKey(c, t.model);
      state.votes[k] = state.votes[k] === v ? undefined : v; // click again to clear
      if (state.votes[k]) postFeedback(c, t, v);
      renderCard();
    }

    function renderCard() {
      const c = state.deck[state.idx];
      $('progress').textContent = `${state.idx + 1} / ${state.deck.length}`;
      const multi = state.selection.length > 1;
      const cells = translationsOf(c).map((t, i) => `
        <div class="tcell" data-i="${i}">
          <div class="emoji">${esc(t.emoji)}</div>
          <div class="tmeta ${state.revealed ? '' : 'hidden'}">
            <span class="vlabel">${esc(t.label)}</span>
            <span class="thumbs">
              <button class="thumb up" data-i="${i}" data-v="up">👍</button>
              <button class="thumb down" data-i="${i}" data-v="down">👎</button>
            </span>
          </div>
        </div>`).join('');
      $('card').innerHTML = `
        <div class="tpair">${cells}</div>
        <div class="reveal ${state.revealed ? '' : 'hidden'}">
          ${multi ? `<div class="badge">${esc(c._pack)}</div>` : ''}
          <div class="title">${esc(c.title)}</div>
          <div class="line">&ldquo;${esc(c.line)}&rdquo;</div>
        </div>
        <div class="row" style="margin-top:22px;" id="controls"></div>`;

      if (state.revealed) {
        const order = translationsOf(c);
        for (const btn of $('card').querySelectorAll('.thumb')) {
          const t = order[+btn.dataset.i];
          if (state.votes[voteKey(c, t.model)] === btn.dataset.v) btn.classList.add('on');
          btn.onclick = () => vote(c, t, btn.dataset.v);
        }
      }

      const controls = $('controls');
      if (!state.revealed) {
        const b = document.createElement('button');
        b.className = 'primary'; b.textContent = 'Reveal';
        b.onclick = () => { state.revealed = true; renderCard(); };
        controls.appendChild(b);
      } else {
        const got = document.createElement('button');
        got.className = 'got'; got.textContent = 'Got it ✅';
        got.onclick = () => advance(true);
        const miss = document.createElement('button');
        miss.className = 'miss'; miss.textContent = 'Missed ❌';
        miss.onclick = () => advance(false);
        controls.append(got, miss);
      }
    }

    function advance(scored) {
      if (scored) state.got++; else state.missed++;
      state.idx++;
      state.revealed = false;
      if (state.idx >= state.deck.length) renderEnd(); else renderCard();
    }

    function renderEnd() {
      const total = state.got + state.missed;
      $('progress').textContent = 'done';
      const rated = Object.values(state.votes).filter(Boolean).length;
      $('card').innerHTML = `
        <div class="msg">You named</div>
        <div class="score">${state.got} / ${total}</div>
        ${rated ? `<div class="msg" style="margin-top:10px;">rated ${rated} translation${rated === 1 ? '' : 's'} 👍👎</div>` : ''}
        <div class="row" style="margin-top:24px;">
          <button class="primary" id="again">Play again</button>
          <button class="ghost" id="change">Change deck</button>
        </div>`;
      $('again').onclick = () => startGame(state.selection);
      $('change').onclick = renderPicker;
    }

    // ── Boot ───────────────────────────────────────────────────────
    fetch('./data/packs.json')
      .then((r) => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then((manifest) => {
        state.packs = (manifest.packs || []).filter((p) => p.slug && p.name && p.cards);
        if (state.packs.length === 0) throw new Error('no packs in manifest');
        renderPicker();
      })
      .catch((e) => {
        $('card').innerHTML = `<div class="msg">Couldn't load packs — run <code>node game/scripts/build-cards.mjs --pack &lt;slug&gt;</code> and check <code>data/packs.json</code>.<br><small>${esc(String(e))}</small></div>`;
      });
  </script>
</body>
</html>
