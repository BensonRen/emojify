<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Field Games · emojify</title>
  <meta property="og:title" content="Field Games · emojify">
  <meta property="og:description" content="Guess the line hidden in the emoji — a new line every day.">
  <meta property="og:url" content="https://emojify.me/game">
  <meta property="og:image" content="https://emojify.me/assets/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f3ec; --surface:#faf7f2; --surface2:#f0ead8; --border:#ddd6c8;
      --border2:#c8bfb0; --text:#1c1710; --text-muted:#7a7060; --text-dim:#b8ae9e;
      --accent:#a85c20; --green:#2e6e44; --red:#9e3030;
      --serif:'Cormorant Garamond',Georgia,serif; --mono:'JetBrains Mono',monospace;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--serif);
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:24px; gap:20px; }
    header { text-align:center; }
    h1 { font-size:2rem; font-weight:700; letter-spacing:-.01em; }
    .sub { font-family:var(--mono); font-size:.72rem; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.12em; margin-top:6px; }
    .crumbs { font-family:var(--mono); font-size:.68rem; letter-spacing:.06em; margin-bottom:10px; }
    .crumbs a { color:var(--text-muted); text-decoration:none; }
    .crumbs a:hover { color:var(--accent); }
    .crumbs .dot { color:var(--text-dim); }
    .progress { font-family:var(--mono); font-size:.75rem; color:var(--text-muted);
      letter-spacing:.08em; min-height:1em; }
    .card { background:var(--surface); border:1px solid var(--border);
      border-radius:14px; width:min(560px,92vw); padding:40px 32px;
      box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 8px 30px rgba(0,0,0,.04);
      text-align:center; }
    .emoji { font-size:3.4rem; line-height:1.35; word-break:break-word; min-height:1.4em; }
    .reveal { margin-top:18px; padding-top:18px; border-top:1px dashed var(--border2); }
    .reveal.hidden { display:none; }
    .badge { display:inline-block; font-family:var(--mono); font-size:.62rem;
      text-transform:uppercase; letter-spacing:.1em; color:var(--accent);
      border:1px solid var(--border2); border-radius:999px; padding:3px 10px; margin-bottom:10px; }
    .title { font-size:1.7rem; font-weight:700; color:var(--accent); }
    .line { font-style:italic; font-size:1.15rem; color:var(--text-muted); margin-top:6px; }
    .alt { font-family:var(--mono); font-size:.7rem; color:var(--text-dim);
      margin-top:14px; letter-spacing:.04em; }
    .alt span { color:var(--text-muted); }
    .row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .pick-label { font-family:var(--mono); font-size:.72rem; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.1em; margin-bottom:18px; }
    button { font-family:var(--mono); font-size:.78rem; letter-spacing:.06em;
      text-transform:uppercase; padding:12px 20px; border-radius:10px;
      border:1px solid var(--border2); background:var(--surface2); color:var(--text);
      cursor:pointer; transition:transform .06s ease, background .15s ease; }
    button:hover { background:#e9e1cd; }
    button:active { transform:translateY(1px); }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.got { color:var(--green); border-color:var(--green); }
    button.miss { color:var(--red); border-color:var(--red); }
    button.ghost { background:transparent; color:var(--text-muted); }
    .msg { font-family:var(--mono); font-size:.85rem; color:var(--text-muted); line-height:1.6; }
    .score { font-size:2.2rem; font-weight:700; color:var(--accent); }
    /* two translations shown side by side (blind until reveal) */
    .tpair { display:flex; gap:18px; justify-content:center; align-items:flex-start; flex-wrap:wrap; }
    .tcell { flex:1 1 180px; min-width:150px; }
    .tpair .emoji { font-size:2.6rem; min-height:1.2em; }
    .tmeta { margin-top:12px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .tmeta.hidden { display:none; }
    .vlabel { font-family:var(--mono); font-size:.6rem; text-transform:uppercase;
      letter-spacing:.1em; color:var(--text-muted); border:1px solid var(--border);
      border-radius:999px; padding:2px 9px; }
    .pairnote { font-family:var(--mono); font-size:.6rem; text-transform:uppercase;
      letter-spacing:.14em; color:var(--text-dim); margin-bottom:14px; }
    /* hangman-style structure hint: monospace + spacing so each "_" reads as one char */
    .masked { font-family:var(--mono); font-size:1.05rem; color:var(--text-muted);
      letter-spacing:.18em; white-space:pre-wrap; word-break:break-word; margin-top:18px; }
    .thumbs { display:flex; gap:8px; }
    .thumbs.hidden { display:none; }
    button.thumb { padding:6px 13px; font-size:1rem; line-height:1; }
    button.thumb.up.on { color:var(--green); border-color:var(--green); background:#e6efe8; }
    button.thumb.down.on { color:var(--red); border-color:var(--red); background:#f3e6e6; }
  </style>
</head>
<body>
  <header>
    <div class="crumbs"><a href="/">← galaxy</a><span class="dot"> · </span><a href="/translate">💬 translation bureau</a></div>
    <h1>Emoji or It Didn't Happen</h1>
    <div class="sub">field games · dept. of play · guess the source from the emoji</div>
  </header>
  <div class="progress" id="progress"></div>
  <div class="card" id="card"><div class="msg" id="boot">Unlocking the cabinet…</div></div>

  <script>
    const $ = (id) => document.getElementById(id);
    // Mount-aware base for static data fetches: "/" when served at the site root
    // (local serve.mjs) or "/game/" when deployed under emojify.me/game. Absolute so
    // it resolves correctly whether the page URL has a trailing slash or not.
    const BASE = location.pathname.startsWith('/game') ? '/game/' : '/';
    // selection: array of pack objects ({slug,name,cards}) currently in play.
    // daily: null in free play, or { card, date } during a daily round.
    const state = { packs: [], selection: [], deck: [], idx: 0, revealed: false, got: 0, missed: 0, votes: {}, daily: null };

    function shuffle(a) { // Fisher-Yates
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── Daily line helpers ─────────────────────────────────────────
    // One card a day, same for every visitor: hash the UTC date into the
    // flattened card list (sorted by pack slug then card id, so the pick is
    // stable regardless of load order). Rolls over at UTC midnight.
    const utcToday = () => new Date().toISOString().slice(0, 10);
    const cyrb53 = (str) => {
      let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
      for (let i = 0; i < str.length; i++) {
        const ch = str.charCodeAt(i);
        h1 = Math.imul(h1 ^ ch, 2654435761);
        h2 = Math.imul(h2 ^ ch, 1597334677);
      }
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
      h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      return 4294967296 * (2097151 & h2) + (h1 >>> 0);
    };
    // Honor-system replay guard; localStorage may be unavailable (private mode).
    const dailyStoreKey = (date) => 'emojify-daily-' + date;
    const readDailyResult = (date) => { try { return localStorage.getItem(dailyStoreKey(date)); } catch (e) { return null; } };
    const saveDailyResult = (date, v) => { try { localStorage.setItem(dailyStoreKey(date), v); } catch (e) { /* no-op */ } };
    // Clipboard with a textarea fallback — same pattern as /translate's helper.
    const copyText = (text, btn) => {
      const done = () => {
        const orig = btn.textContent;
        btn.textContent = '✓ copied';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      };
      const fallback = () => {
        try {
          const t = document.createElement('textarea');
          t.value = text; t.setAttribute('readonly', '');
          t.style.position = 'absolute'; t.style.left = '-9999px';
          document.body.appendChild(t);
          t.select();
          document.execCommand('copy');
          document.body.removeChild(t);
          done();
        } catch (e) { /* no-op */ }
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, fallback);
      } else fallback();
    };

    // ── Pack picker ────────────────────────────────────────────────
    function renderPicker() {
      state.daily = null;
      // Leaving the daily round drops the deep link so reload lands here.
      try { if (location.hash === '#daily') history.replaceState(null, '', location.pathname + location.search); } catch (e) { /* no-op */ }
      $('progress').textContent = '';
      const multi = state.packs.length > 1;
      $('card').innerHTML = `
        <div class="pick-label">One line a day, same for every agent</div>
        <div class="row"><button class="primary" id="daily-btn">📅 Today's line</button></div>
        <div class="pick-label" style="margin-top:26px;">…or pull a deck from the cabinet</div>
        <div class="row" id="picks"></div>`;
      $('daily-btn').onclick = startDaily;
      const picks = $('picks');
      for (const p of state.packs) {
        const b = document.createElement('button');
        b.className = 'primary'; b.textContent = p.name;
        b.onclick = () => startGame([p]);
        picks.appendChild(b);
      }
      if (multi) {
        const all = document.createElement('button');
        all.textContent = 'The whole cabinet';
        all.onclick = () => startGame(state.packs.slice());
        picks.appendChild(all);
      }
    }

    // ── Deck loading ───────────────────────────────────────────────
    // Fetch + flatten the card files for a set of packs; each card is tagged
    // with its pack name (reveal badge) and slug (stable daily ordering).
    const loadDecks = (selection) => Promise.all(selection.map((p) =>
      fetch(BASE + 'data/' + p.cards).then((r) => {
        if (!r.ok) throw new Error(p.cards + ' http ' + r.status);
        return r.json();
      }).then((cards) => cards.map((c) => ({ ...c, _pack: p.name, _slug: p.slug })))))
      .then((decks) => decks.flat());

    async function startGame(selection) {
      state.daily = null;
      state.selection = selection;
      $('card').innerHTML = `<div class="msg">Shuffling…</div>`;
      try {
        const deck = await loadDecks(selection);
        if (deck.length === 0) throw new Error('empty deck');
        state.deck = shuffle(deck);
        state.idx = 0; state.revealed = false; state.got = 0; state.missed = 0; state.votes = {};
        renderCard();
      } catch (e) {
        $('card').innerHTML = `<div class="msg">Deck failed to load.<br><small>${esc(String(e))}</small></div>
          <div class="row" style="margin-top:18px;"><button class="ghost" onclick="location.reload()">Back</button></div>`;
      }
    }

    // ── Daily round ────────────────────────────────────────────────
    async function startDaily() {
      const date = utcToday();
      $('card').innerHTML = `<div class="msg">Pulling today's docket…</div>`;
      try {
        const all = (await loadDecks(state.packs)).sort((a, b) =>
          a._slug === b._slug
            ? (a.id < b.id ? -1 : a.id > b.id ? 1 : 0)
            : (a._slug < b._slug ? -1 : 1));
        if (all.length === 0) throw new Error('empty cabinet');
        const card = all[cyrb53(date) % all.length];
        const prior = readDailyResult(date);
        if (prior === 'got' || prior === 'missed') { renderDailyEnd(card, prior, date); return; }
        state.selection = state.packs.slice();
        state.daily = { card, date };
        state.deck = [card];
        state.idx = 0; state.revealed = false; state.got = 0; state.missed = 0; state.votes = {};
        renderCard();
      } catch (e) {
        $('card').innerHTML = `<div class="msg">Today's docket failed to load.<br><small>${esc(String(e))}</small></div>
          <div class="row" style="margin-top:18px;"><button class="ghost" onclick="location.reload()">Back</button></div>`;
      }
    }

    function renderDailyEnd(card, outcome, date) {
      state.daily = null;
      $('progress').textContent = 'filed';
      const gotIt = outcome === 'got';
      const emoji = card.emoji || card.emojiAlt || '';
      const shareText = `emojify · field games · daily ${date}\n${emoji}\n${gotIt ? 'got ✅' : 'missed ❌'}\nhttps://emojify.me/game#daily`;
      $('card').innerHTML = `
        <div class="pick-label">today's line · ${esc(date)}</div>
        <div class="emoji">${esc(emoji)}</div>
        <div class="reveal">
          <div class="badge">${esc(card._pack)}</div>
          <div class="title">${esc(card.title)}</div>
          <div class="line">&ldquo;${esc(card.line)}&rdquo;</div>
        </div>
        <div class="msg" style="margin-top:18px;">
          ${gotIt ? 'named it ✅ — the bureau notes your fluency' : 'missed ❌ — the line slipped past the checkpoint'}<br>
          fresh line at UTC midnight
        </div>
        <div class="row" style="margin-top:24px;">
          <button class="primary" id="share-daily">Copy share line</button>
          <button class="ghost" id="free-play">Play free decks</button>
        </div>`;
      $('share-daily').onclick = () => copyText(shareText, $('share-daily'));
      $('free-play').onclick = renderPicker;
    }

    // ── Play ───────────────────────────────────────────────────────
    // The two model translations present on a card, in a per-card randomized order
    // so their on-screen position can't leak which model is which while guessing.
    function translationsOf(c) {
      const present = [
        { model: 'minimax', label: 'minimax', emoji: c.emoji },
        { model: 'openai', label: 'gpt-4o-mini', emoji: c.emojiAlt },
      ].filter((t) => t.emoji);
      if (c._order === undefined) c._order = Math.random() < 0.5 ? 0 : 1;
      return (c._order && present.length === 2) ? [present[1], present[0]] : present;
    }
    const voteKey = (c, model) => `${c._pack}|${c.id}|${model}`;
    // Hangman-style structure hint: each letter/number -> "_", spaces and
    // punctuation kept, so word count, word lengths, and punctuation show through.
    const maskLine = (s) => s.replace(/[\p{L}\p{N}]/gu, '_');

    // Fire-and-forget: a feedback POST must never break the game (matches the
    // project's "degrade gracefully on backend hiccups" rule). Served by serve.mjs.
    function postFeedback(c, t, vote) {
      fetch('/api/feedback', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cardId: c.id, pack: c._pack, title: c.title,
          line: c.line, model: t.model, emoji: t.emoji, vote }),
      }).catch(() => {});
    }
    function vote(c, t, v) {
      const k = voteKey(c, t.model);
      state.votes[k] = state.votes[k] === v ? undefined : v; // click again to clear
      if (state.votes[k]) postFeedback(c, t, v);
      renderCard();
    }

    function renderCard() {
      const c = state.deck[state.idx];
      $('progress').textContent = state.daily
        ? `today's line · ${state.daily.date}`
        : `${state.idx + 1} / ${state.deck.length}`;
      const multi = state.selection.length > 1;
      const order = translationsOf(c);
      // While guessing the two clerks stay anonymous (Clerk A / Clerk B); on reveal
      // they get their real model names. The A/B labels make clear the two rows are
      // two different models' takes on the SAME line.
      const anon = ['Clerk A', 'Clerk B'];
      const cells = order.map((t, i) => {
        const label = state.revealed ? t.label : (order.length > 1 ? anon[i] : '');
        return `
        <div class="tcell" data-i="${i}">
          <div class="emoji">${esc(t.emoji)}</div>
          <div class="tmeta">
            ${label ? `<span class="vlabel">${esc(label)}</span>` : ''}
            <span class="thumbs ${state.revealed ? '' : 'hidden'}">
              <button class="thumb up" data-i="${i}" data-v="up">👍</button>
              <button class="thumb down" data-i="${i}" data-v="down">👎</button>
            </span>
          </div>
        </div>`;
      }).join('');
      const pairNote = (!state.revealed && order.length > 1)
        ? `<div class="pairnote">two clerks · same line</div>` : '';
      $('card').innerHTML = `
        ${pairNote}
        <div class="tpair">${cells}</div>
        ${state.revealed ? '' : `<div class="masked">${esc(maskLine(c.line))}</div>`}
        <div class="reveal ${state.revealed ? '' : 'hidden'}">
          ${multi ? `<div class="badge">${esc(c._pack)}</div>` : ''}
          <div class="title">${esc(c.title)}</div>
          <div class="line">&ldquo;${esc(c.line)}&rdquo;</div>
        </div>
        <div class="row" style="margin-top:22px;" id="controls"></div>
        <div class="row" style="margin-top:14px;">
          <button class="ghost" id="quit">← Change deck</button>
        </div>`;
      $('quit').onclick = renderPicker; // bail mid-game to play another set

      if (state.revealed) {
        for (const btn of $('card').querySelectorAll('.thumb')) {
          const t = order[+btn.dataset.i];
          if (state.votes[voteKey(c, t.model)] === btn.dataset.v) btn.classList.add('on');
          btn.onclick = () => vote(c, t, btn.dataset.v);
        }
      }

      const controls = $('controls');
      if (!state.revealed) {
        const b = document.createElement('button');
        b.className = 'primary'; b.textContent = 'Reveal';
        b.onclick = () => { state.revealed = true; renderCard(); };
        controls.appendChild(b);
      } else {
        const got = document.createElement('button');
        got.className = 'got'; got.textContent = 'Got it ✅';
        got.onclick = () => advance(true);
        const miss = document.createElement('button');
        miss.className = 'miss'; miss.textContent = 'Missed ❌';
        miss.onclick = () => advance(false);
        controls.append(got, miss);
      }
    }

    function advance(scored) {
      if (scored) state.got++; else state.missed++;
      state.idx++;
      state.revealed = false;
      if (state.daily) {
        const outcome = scored ? 'got' : 'missed';
        saveDailyResult(state.daily.date, outcome);
        renderDailyEnd(state.daily.card, outcome, state.daily.date);
      } else if (state.idx >= state.deck.length) renderEnd();
      else renderCard();
    }

    function renderEnd() {
      const total = state.got + state.missed;
      $('progress').textContent = 'done';
      const rated = Object.values(state.votes).filter(Boolean).length;
      $('card').innerHTML = `
        <div class="msg">Field report — you named</div>
        <div class="score">${state.got} / ${total}</div>
        ${rated ? `<div class="msg" style="margin-top:10px;">stamped ${rated} translation${rated === 1 ? '' : 's'} 👍👎 — the clerks thank you</div>` : ''}
        <div class="row" style="margin-top:24px;">
          <button class="primary" id="again">Another round</button>
          <button class="ghost" id="change">Change deck</button>
        </div>`;
      $('again').onclick = () => startGame(state.selection);
      $('change').onclick = renderPicker;
    }

    // ── Boot ───────────────────────────────────────────────────────
    fetch(BASE + 'data/packs.json')
      .then((r) => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then((manifest) => {
        state.packs = (manifest.packs || []).filter((p) => p.slug && p.name && p.cards);
        if (state.packs.length === 0) throw new Error('no packs in manifest');
        // #daily deep link skips the picker and lands straight in the daily round.
        if (location.hash === '#daily') startDaily(); else renderPicker();
      })
      .catch((e) => {
        $('card').innerHTML = `<div class="msg">Couldn't load packs — run <code>node game/scripts/build-cards.mjs --pack &lt;slug&gt;</code> and check <code>data/packs.json</code>.<br><small>${esc(String(e))}</small></div>`;
      });
  </script>
</body>
</html>
