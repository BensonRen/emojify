  updateResidents(dt,RMQ?0:mdt,t);
  questTick();
  clouds.forEach((c,i)=>{c.d.applyAxisAngle(new THREE.Vector3(0,1,0),mdt*0.02);c.sp.position.copy(c.d).multiplyScalar(R+12+i);});
  // district life: hovering pieces breathe, the air mail flies, ❓ blocks pay out
  ambT+=(RMQ?0:mdt);
  for(const f of floaters){f.sp.position.copy(f.d).multiplyScalar(f.base+Math.sin(ambT*1.3+f.ph)*0.12);f.sp.rotateY(mdt*f.spin);}
  { // the mail cart ping-pongs its route; wheels actually roll; the balloon strains at its tether
    const ph=ambT*0.1,tt=(Math.sin(ph)+1)/2,run=Math.cos(ph);
    cartAt(tt,_cartD);cartAt(tt+0.012,_cartD2);
    _cartF.subVectors(_cartD2,_cartD);
    _cartF.sub(_cartD.clone().multiplyScalar(_cartF.dot(_cartD)));
    if(_cartF.lengthSq()>1e-8){_cartF.normalize();if(run<0)_cartF.negate();
      _cartM.makeBasis(_cartX.crossVectors(_cartD,_cartF).normalize(),_cartD,_cartF);
      cart.quaternion.setFromRotationMatrix(_cartM);}
    cart.position.copy(_cartD).multiplyScalar(ground(_cartD)+0.04);
    for(const w of cart.userData.wheels)w.rotation.x+=mdt*4.2*Math.abs(run);
    heliox.position.copy(balloonDir).multiplyScalar(ground(balloonDir)+2.0+Math.sin(ambT*0.5)*0.5);
  }
  if(wellDir){ // toss a wish in, a word comes back
    wellCool-=dt;
    if(wellCool<=0&&wellDir.angleTo(posDir)*R<3.0){wellCool=2.6;
      const w2=wellPool[(Math.random()*wellPool.length)|0];
      if(w2.t>=1){w2.t=0;w2.b.position.copy(wellDir).multiplyScalar(ground(wellDir)+2.4);
        if(window.Ambience)Ambience.event('chime');}}
    for(const p of wellPool)if(p.t<1){p.t+=dt*0.5;
      p.b.material.opacity=0.95*(1-p.t);p.b.position.addScaledVector(wellDir,dt*1.2);
      if(p.t>=1)p.b.material.opacity=0;}
  }
  if(smokes.length){ // chimney smoke drifts up and thins
    const smdt=RMQ?0:mdt;
    smokeT-=smdt;
    if(smokeT<=0&&smdt>0){smokeT=1.4;const c=chimneys[smokeI%chimneys.length];const p=smokes[smokeI++%smokes.length];
      p.t=0;p.d=c.d;p.s.visible=true;
      p.s.position.copy(c.d).multiplyScalar(ground(c.d)+c.lift);p.s.scale.setScalar(0.32);}
    for(const p of smokes)if(p.t<1&&p.d){p.t+=smdt*0.4;p.s.material.opacity=0.4*(1-p.t);
      p.s.position.addScaledVector(p.d,smdt*0.9);p.s.scale.multiplyScalar(1+smdt*0.45);if(p.t>=1)p.s.visible=false;}
  }
  for(const s of skyShips){
    s.d.applyAxisAngle(s.axis,(RMQ?0:mdt)*s.speed);s.sp.position.copy(s.d).multiplyScalar(R+s.alt);
    _shipV.crossVectors(s.axis,s.d).normalize(); // velocity tangent — the nose leads
    _shipM.makeBasis(_shipX.crossVectors(s.d,_shipV).normalize(),s.d,_shipV);
    s.sp.quaternion.setFromRotationMatrix(_shipM);
  }
  for(const b of bumpers){
    b.cool=Math.max(0,b.cool-dt);
    if(b.t>0)b.t=Math.max(0,b.t-dt*2.2);
    if(b.d.angleTo(posDir)*R<1.3&&b.cool<=0){b.t=1;b.cool=1.2;if(window.Ambience)Ambience.event('coin');}
    b.sp.position.copy(b.d).multiplyScalar(ground(b.d)+2.35+Math.sin(b.t*Math.PI)*0.7);
  }
  // secrets: stepping close to a sparkle claims it
  for(const s of secrets){
    if(!s.sp.visible)continue;
    s.sp.rotateY(dt*1.4);
    if(s.d.angleTo(posDir)*R<1.5){s.sp.visible=false;foundSet.add(s.i);
      try{localStorage.setItem(FOUND_KEY,JSON.stringify([...foundSet]));}catch(e){}
      syncFound();if(window.Ambience)Ambience.event('coin');}
  }
  kiosk.getWorldPosition(kw);nearKiosk=kw.distanceTo(avatar.position)<6&&!toolOpen();
  if(nearKiosk&&!wasNear&&window.Ambience)Ambience.event(T.chime); // the counter notices you
  wasNear=nearKiosk;
  promptEl.classList.toggle('on',nearKiosk);
  // adaptive degrade: if frame rate sags on a machine the heuristic missed, shed bloom + dpr once
  if(!degraded&&t>6){fpsAcc+=dt;fpsN++;
    if(fpsN>=90){const fps=fpsN/fpsAcc;if(fps<38){degraded=true;composer=null;renderer.setPixelRatio(1);}fpsAcc=0;fpsN=0;}}
  if(composer)composer.render();else renderer.render(scene,camera);
  if(!firstFrame){firstFrame=true;document.getElementById('loading').classList.add('gone');
    document.getElementById('fallback').classList.remove('on');} // retract the watchdog if vendor fetches were just slow
  requestAnimationFrame(animate);}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);if(composer)composer.setSize(W,H);});

// hand-edited hash → reload re-runs theme routing/validation (in-app navs are full loads anyway)
addEventListener('hashchange',()=>location.reload());

// test/debug handle
window.__world={key:worldKey,posDir:()=>posDir.toArray(),nearKiosk:()=>nearKiosk,openTool,theme:{pixel:T.pixel,terrace:T.terrace},residents:()=>residents.map(r=>r.state),secrets:()=>[...foundSet],fluent:!!FLUENT,zones:ZONES.map(z=>z.key),props:NP,
  colliders:COLLIDERS.length,mail:()=>({carrying,done:mailDone.size}),
  _mail:{giver:()=>giver&&giver.d.toArray(),target:()=>giver&&QUEST_LM[giver.q].d.toArray()},
  _tp:a=>{posDir.set(a[0],a[1],a[2]).normalize();heading.crossVectors(new THREE.Vector3().crossVectors(posDir,heading),posDir).normalize();}};
}
</script>
</body>
