    ps[i]=propSlot[e];pz[i]=z;
    setShadow(i,d,z);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pp,3));
  g.setAttribute('aSlot',new THREE.BufferAttribute(ps,1));
  g.setAttribute('aSize',new THREE.BufferAttribute(pz,1));
  scene.add(new THREE.Points(g,propMat));
}

// ── a stone path from the landing spot to the kiosk — the planet tells you where to go ──
const spawnDir=new THREE.Vector3(0,0.15,1).normalize();
const kioskDir=new THREE.Vector3(0.25,0.12,1).normalize();
{
  const N=13;
  const stones=new THREE.InstancedMesh(new THREE.CircleGeometry(0.42,T.pixel?4:14),
    new THREE.MeshBasicMaterial({color:T.stone,transparent:true,opacity:0.85,depthWrite:false}),N);
  const qa=new THREE.Quaternion().setFromUnitVectors(_z,spawnDir);
  for(let i=0;i<N;i++){
    const t=(i+1)/(N+1);
    const d=new THREE.Vector3().copy(spawnDir).lerp(kioskDir,t).normalize(); // short arc — lerp+norm ≈ slerp here
    d.applyAxisAngle(spawnDir,Math.sin(i*1.7)*0.012); // a path wanders a little
    const q=new THREE.Quaternion().setFromUnitVectors(_z,d);
    const m=new THREE.Matrix4().compose(
      new THREE.Vector3().copy(d).multiplyScalar(ground(d)+0.085),
      q,new THREE.Vector3(0.85+Math.random()*0.3,0.85+Math.random()*0.3,1));
    stones.setMatrixAt(i,m);
  }
  scene.add(stones);
}

// ── three hidden sparkles — the planet rewards wandering ──
const FOUND_KEY='emojify-found-'+worldKey;
let foundSet;try{foundSet=new Set(JSON.parse(localStorage.getItem(FOUND_KEY)||'[]'));}catch(e){foundSet=new Set();}
const SECRET_DIRS=[new THREE.Vector3(-0.8,0.45,-0.2),new THREE.Vector3(0.3,-0.85,0.4),new THREE.Vector3(-0.5,-0.1,-0.85)].map(v=>v.normalize());
const secrets=SECRET_DIRS.map((d,i)=>{
  const sp=emo('✨',0.9);sp.position.copy(d).multiplyScalar(ground(d)+0.8);sp.visible=!foundSet.has(i);scene.add(sp);
  return {d,sp,i};
});
const foundEl=document.getElementById('found');
function syncFound(){
  if(foundSet.size>0){foundEl.classList.add('on');
    foundEl.textContent=foundSet.size>=3?'✦ 3/3 · the planet likes you':'✦ '+foundSet.size+'/3 found';}
}
syncFound();

// ── residents: they wander, they notice you, they have something to say ──
const residents=[];
function makeBubble(glyph){
  const c=document.createElement('canvas');c.width=128;c.height=104;const x=c.getContext('2d');
  x.fillStyle='rgba(255,251,240,.97)';x.strokeStyle='#e0d2ac';x.lineWidth=3;
  x.beginPath();x.roundRect(8,6,112,72,18);x.fill();x.stroke();
  x.beginPath();x.moveTo(56,76);x.lineTo(64,98);x.lineTo(76,76);x.closePath();x.fill();x.stroke();
  x.font='44px "Apple Color Emoji","Segoe UI Emoji",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(glyph,64,43);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false,opacity:0}));
  s.scale.set(1.7,1.38,1);return s;}
T.residents.forEach((e,i)=>{
  const a=Math.random()*6.28,el=Math.random()*0.9-0.15;
  const d=new THREE.Vector3(Math.cos(a)*Math.cos(el),Math.sin(el),Math.sin(a)*Math.cos(el)).normalize();
  const h=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0),d).normalize().applyAxisAngle(d,Math.random()*6.28);
  const sp=emo(e,1.5);scene.add(sp);
  const bub=makeBubble(T.bubbles[i%T.bubbles.length]);scene.add(bub);
  residents.push({sp,bub,d,h,ph:Math.random()*6.28,speed:0.035+Math.random()*0.04,state:'wander',stateT:0,bubA:0,shIdx:NP+i});});
const _ra=new THREE.Vector3(),_rq=new THREE.Quaternion();
function stepOnSphere(o,ang){ // transport a {d,h} walker along its heading
  _ra.crossVectors(o.d,o.h).normalize();_rq.setFromAxisAngle(_ra,ang);
  o.d.applyQuaternion(_rq);o.h.applyQuaternion(_rq);o.d.normalize();
  o.h.crossVectors(new THREE.Vector3().crossVectors(o.d,o.h),o.d).normalize();}
function updateResidents(dt,mdt,t){
  let shDirty=false;
  for(const r of residents){
    const arc=r.d.angleTo(posDir)*R; // surface distance to the player
    r.stateT+=dt;
    if(arc<2.0&&r.state!=='flee'){ // brushed — scatter!
      r.state='flee';r.stateT=0;
      const away=new THREE.Vector3().subVectors(r.d,posDir);
      r.h.copy(away.sub(r.d.clone().multiplyScalar(away.dot(r.d))).normalize());
    }else if(r.state==='flee'&&r.stateT>1.1){r.state='wander';}
    else if(r.state==='wander'&&arc<5.5){r.state='greet';r.stateT=0;}
    else if(r.state==='greet'&&arc>6.5){r.state='wander';}
    if(r.state==='wander'&&mdt>0){r.h.applyAxisAngle(r.d,(Math.random()-0.5)*0.5*mdt);stepOnSphere(r,r.speed*mdt);shDirty=true;}
    else if(r.state==='flee'){stepOnSphere(r,0.45*dt);shDirty=true;} // fleeing is a reaction to YOU — always allowed
    const keen=r.state==='greet'?1.8:1.0;
    const base=ground(r.d)+0.7;
    r.sp.position.copy(r.d).multiplyScalar(base+Math.abs(Math.sin(t*1.9*keen+r.ph))*0.16*keen);
    if(shDirty)setShadow(r.shIdx,r.d,1.5);
    r.bubA+=((r.state==='greet'?1:0)-r.bubA)*Math.min(1,dt*5);
    r.bub.material.opacity=r.bubA*0.95;
    r.bub.position.copy(r.d).multiplyScalar(base+2.1);
  }
  if(shDirty)shMesh.instanceMatrix.needsUpdate=true;
}
// ── floating clouds ──
const clouds=[];for(let i=0;i<(lowPower?4:7);i++){const a=Math.random()*6.28,el=0.3+Math.random()*0.5;const d=new THREE.Vector3(Math.cos(a)*Math.cos(el),Math.sin(el),Math.sin(a)*Math.cos(el)).normalize();const sp=emo('☁️',4+Math.random()*3);sp.position.copy(d).multiplyScalar(R+10+Math.random()*8);scene.add(sp);clouds.push({sp,d});}

// ── the KIOSK you walk to ──
const kiosk=emo(T.kiosk,3.2);kiosk.position.copy(kioskDir).multiplyScalar(ground(kioskDir)+3.2*0.42);planet.add(kiosk);
const kSign=emo(T.kioskSign,1.6);kSign.position.copy(kioskDir).multiplyScalar(ground(kioskDir)+2.6);planet.add(kSign);
setShadow(SH_COUNT-1,kioskDir,3.2);
shMesh.instanceMatrix.needsUpdate=true;

// ── avatar + close chase-cam (Messenger feel) ──
const AV_SCALE=2.6;
const avatar=emo('🧑‍🚀',AV_SCALE);scene.add(avatar);
const shadow=new THREE.Mesh(new THREE.CircleGeometry(1.0,24),new THREE.MeshBasicMaterial({color:0x33502f,transparent:true,opacity:0.28}));scene.add(shadow);
let posDir=spawnDir.clone();
let heading=new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0),posDir).normalize();
const camPos=new THREE.Vector3(),camTgt=new THREE.Vector3();
let leanAmt=0,kioskBlend=0;
const kw=new THREE.Vector3();
function placeCamera(initial){
  const up=posDir.clone();
  const aPos=posDir.clone().multiplyScalar(ground(posDir)+1.0);
  avatar.position.copy(aPos).addScaledVector(up,1.0+bobOff);
  avatar.scale.set(AV_SCALE*(1+squash*0.5),AV_SCALE*(1-squash),1);
  shadow.position.copy(posDir).multiplyScalar(ground(posDir)+0.05);
  shadow.lookAt(shadow.position.clone().add(posDir));
  const tgt=aPos.clone().addScaledVector(heading,11).addScaledVector(up,-0.4);
  const cp=aPos.clone().addScaledVector(heading,-7).addScaledVector(up,5.4);
  if(kioskBlend>0){ // the camera leans into the counter while the card is up — the world stays the scene
    kiosk.getWorldPosition(kw);
    const kcp=kw.clone().add(new THREE.Vector3().subVectors(aPos,kw).normalize().multiplyScalar(6.5)).addScaledVector(up,2.6);
    cp.lerp(kcp,kioskBlend);tgt.lerp(kw,kioskBlend);
  }
  if(initial){camPos.copy(cp);camTgt.copy(tgt);}else{camPos.lerp(cp,0.12);camTgt.lerp(tgt,0.14);}
  camera.up.copy(up.applyAxisAngle(heading,-leanAmt*0.10)); // lean into the turn
  camera.position.copy(camPos);camera.lookAt(camTgt);
}

// ── input: keyboard + touch drag-joystick ──
const toolEl=document.getElementById('tool');
const toolOpen=()=>toolEl.classList.contains('on');
const keys={};
const isTyping=e=>/^(input|textarea)$/i.test(e.target.tagName||'');
addEventListener('keydown',e=>{
  if(e.key==='Escape'&&toolOpen()){closeTool();return;} // must beat the typing guard — Esc closes even from the textarea
  if(isTyping(e))return;const k=e.key.toLowerCase();keys[k]=true;
  if(e.key===' '||e.key==='Enter'){if(nearKiosk&&!toolOpen()){e.preventDefault();openTool();}}
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();});
// keyup is never guarded: clearing a key is always safe, and guarding it latches held keys
// when focus jumps into the kiosk textarea mid-walk
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
addEventListener('blur',()=>{for(const k in keys)keys[k]=false;joy=null;}); // Cmd-Tab mid-walk must not auto-walk forever
let joy=null; // drag-anywhere joystick: dx → turn, dy → walk
addEventListener('touchstart',e=>{if(e.target.closest('button,a,#tool'))return;const t=e.changedTouches[0];joy={id:t.identifier,ox:t.clientX,oy:t.clientY,dx:0,dy:0};},{passive:true});
addEventListener('touchmove',e=>{if(!joy)return;for(const t of e.changedTouches)if(t.identifier===joy.id){joy.dx=(t.clientX-joy.ox)/70;joy.dy=(t.clientY-joy.oy)/70;}},{passive:true});
addEventListener('touchend',e=>{if(joy)for(const t of e.changedTouches)if(t.identifier===joy.id)joy=null;},{passive:true});
addEventListener('touchcancel',()=>{joy=null;},{passive:true}); // system gestures fire cancel, not end — never latch the walk

let nearKiosk=false,wasNear=false;const promptEl=document.getElementById('prompt');
let moveInput=0,turnInput=0;
function walk(dt){
  moveInput=0;turnInput=0;
  if(toolOpen())return;
  const turn=1.6*dt,move=0.9*dt;let f=0;
  if(keys['arrowleft']||keys['a']){heading.applyAxisAngle(posDir,turn);turnInput=1;}
  if(keys['arrowright']||keys['d']){heading.applyAxisAngle(posDir,-turn);turnInput=-1;}
  if(keys['arrowup']||keys['w'])f=move;if(keys['arrowdown']||keys['s'])f=-move*0.6;
  if(joy){const tx=Math.max(-1,Math.min(1,joy.dx));heading.applyAxisAngle(posDir,-tx*turn);turnInput=-tx;f=Math.max(-0.6,Math.min(1,-joy.dy))*move;}
  if(f){const axis=new THREE.Vector3().crossVectors(posDir,heading).normalize();const q=new THREE.Quaternion().setFromAxisAngle(axis,f);posDir.applyQuaternion(q);heading.applyQuaternion(q);posDir.normalize();heading.crossVectors(new THREE.Vector3().crossVectors(posDir,heading),posDir).normalize();}
  moveInput=f/move; // -0.6..1
}

// ── walk juice: the bob belongs to the stride, not the clock ──
let stepPhase=0,bobOff=0,squash=0,bobAmp=0;
const RMQ=RM; // reduced-motion: minimal bob, no puffs, no lean
const puffs=[];const puffMat=new THREE.SpriteMaterial({map:(function(){const c=document.createElement('canvas');c.width=c.height=48;const x=c.getContext('2d');const g=x.createRadialGradient(24,24,2,24,24,22);g.addColorStop(0,'rgba(255,253,240,.85)');g.addColorStop(1,'rgba(190,210,150,0)');x.fillStyle=g;x.beginPath();x.arc(24,24,22,0,7);x.fill();return new THREE.CanvasTexture(c);})(),transparent:true,depthWrite:false});
for(let i=0;i<8;i++){const s=new THREE.Sprite(puffMat.clone());s.visible=false;scene.add(s);puffs.push({s,t:1});}
let puffIdx=0;
function spawnPuff(){
  if(RMQ)return;
  const p=puffs[puffIdx++%puffs.length];p.t=0;p.s.visible=true;
  const side=new THREE.Vector3().crossVectors(posDir,heading).normalize().multiplyScalar((Math.random()-0.5)*0.5);
  p.s.position.copy(posDir).multiplyScalar(ground(posDir)+0.25).add(side).addScaledVector(heading,-0.4);
  p.s.scale.setScalar(0.35+Math.random()*0.2);}
function updateJuice(dt){
  const moving=Math.abs(moveInput)>0.05;
  bobAmp+=(((moving?0.14:0.02)*(RMQ?0.2:1))-bobAmp)*Math.min(1,dt*6);
  const prev=Math.sin(stepPhase);
  stepPhase+=dt*(moving?9.5*Math.abs(moveInput):1.4);
  const cur=Math.sin(stepPhase);
  bobOff=Math.abs(cur)*bobAmp;
  squash=RMQ?0:Math.max(0,1-Math.abs(cur)*3)*0.10*(moving?1:0.15); // squash at footfall
  if(moving&&prev>=0!==cur>=0)spawnPuff();                          // a puff each footfall
  leanAmt+=((RMQ?0:turnInput)-leanAmt)*Math.min(1,dt*4);
  for(const p of puffs){if(p.t<1){p.t+=dt*2.2;p.s.material.opacity=0.5*(1-p.t);p.s.position.addScaledVector(posDir,dt*0.5);p.s.scale.multiplyScalar(1+dt*1.6);if(p.t>=1)p.s.visible=false;}}
  if(window.Ambience)Ambience.walking(moving&&!toolOpen());
}

// ── kiosk tool card: the REAL tools ──
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CLERKS={minimax:'clerk nº1 · MiniMax',openai:'clerk nº2 · GPT-4o mini'};
function openTool(){
  document.getElementById('t-ey').textContent=T.toolEy;
  document.getElementById('t-title').textContent=T.toolTitle;
  const b=document.getElementById('t-body');
  if(T.toolKind==='translate'){
    b.innerHTML='<textarea class="tt" id="tt" rows="2" placeholder="say anything…"></textarea><button class="tbtn" id="tgo">translate to emoji →</button><div class="tout" id="tout"></div><div class="tnote">two clerks render it live · <a href="/translate">visit the full bureau →</a></div>';
    wireTranslate();
  }else{
    b.innerHTML='<div class="tclue">🎵 ❓ 🎮</div><div class="tnote">a song is hiding in the emoji — a fresh line every day.</div><button class="tbtn" id="tgo">play today\'s line →</button>';
    document.getElementById('tgo').onclick=()=>{if(window.Ambience)Ambience.event('coin');location.href='/game#daily';};
  }
  for(const k in keys)keys[k]=false; // a key held while the tool grabs focus must not latch
  toolEl.classList.add('on');
  if(window.Ambience)Ambience.event('open');
}
function closeTool(){toolEl.classList.remove('on');
  // the overlay hides via opacity, so a focused textarea would silently eat all walk keys
  if(toolEl.contains(document.activeElement))document.activeElement.blur();
  for(const k in keys)keys[k]=false;}
document.getElementById('tclose').onclick=closeTool;
const useToolBtn=document.getElementById('use-tool');
useToolBtn.textContent=T.skip;
useToolBtn.onclick=openTool;
setTimeout(()=>useToolBtn.classList.add('on'),20000); // the walk gets first right of way
promptEl.onclick=()=>{if(nearKiosk)openTool();};
toolEl.addEventListener('click',e=>{if(e.target===toolEl)closeTool();});
function wireTranslate(){
  const go=document.getElementById('tgo'),ta=document.getElementById('tt'),out=document.getElementById('tout');
  async function run(){
    const text=ta.value.trim();if(!text){ta.focus();return;}
    go.disabled=true;go.textContent='translating…';out.innerHTML='<span style="opacity:.5">✨</span>';
    try{
      const r=await fetch('/api/emoji-translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      if(r.status===429){out.innerHTML='<div class="terr">easy, traveler — the bureau needs a minute.<br>try again shortly.</div>';return;}
      const data=await r.json().catch(()=>null);
      const res=(data&&Array.isArray(data.results))?data.results:[];
      if(!res.some(x=>x&&x.ok&&x.emoji)){out.innerHTML='<div class="terr">both clerks are at lunch — try again.</div>';return;}
      out.innerHTML=res.map(x=>x&&x.ok
        ?`<div class="trow"><small>${esc(CLERKS[x.provider]||x.provider)}</small><span>${esc(x.emoji)}</span></div>`
        :`<div class="trow off"><small>${esc(CLERKS[x?.provider]||x?.provider||'?')}</small><span>resting</span></div>`).join('');
      if(window.Ambience)Ambience.event('chime');
    }catch(_){out.innerHTML='<div class="terr">lost in space — check your connection.</div>';}
    finally{go.disabled=false;go.textContent='translate to emoji →';}
  }
  go.onclick=run;
  ta.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();run();}});
  ta.focus();
}
document.getElementById('leave').onclick=()=>{location.href='/#'+T.galaxyIdx;};

// ── sound + motion controls ──
const muteBtn=document.getElementById('mute');
function syncMute(){muteBtn.textContent=(window.Ambience&&Ambience.muted())?'🔇':'🔈';}
syncMute();
muteBtn.onclick=()=>{if(window.Ambience){Ambience.toggleMute();syncMute();}};
let paused=false;
const pauseBtn=document.getElementById('pause');
pauseBtn.onclick=()=>{paused=!paused;pauseBtn.textContent=paused?'▶':'⏸';pauseBtn.setAttribute('aria-pressed',String(paused));};
function audioUnlock(){if(window.Ambience)Ambience.start(worldKey==='games'?'games':'translate');}
['keydown','pointerdown','touchstart'].forEach(ev=>addEventListener(ev,audioUnlock,{once:true,passive:true}));

// ── render ──
let composer=null;
if(!lowPower&&!T.pixel&&!RM){
  composer=new EffectComposer(renderer);composer.addPass(new RenderPass(scene,camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(W,H),0.14,0.5,0.95));composer.addPass(new OutputPass());
}
const clock=new THREE.Clock();
let firstFrame=false;
let fpsAcc=0,fpsN=0,degraded=false;
placeCamera(true);
function animate(){const dt=Math.min(0.05,clock.getDelta()),t=clock.elapsedTime;
  const mdt=paused?0:dt; // ambient motion respects the pause control; your own walking stays yours
  walk(dt);updateJuice(dt);
  kioskBlend+=((toolOpen()?1:0)-kioskBlend)*Math.min(1,dt*3);
  placeCamera(false);
  updateResidents(dt,RMQ?0:mdt,t);
  clouds.forEach((c,i)=>{c.d.applyAxisAngle(new THREE.Vector3(0,1,0),mdt*0.02);c.sp.position.copy(c.d).multiplyScalar(R+12+i);});
  // secrets: stepping close to a sparkle claims it
  for(const s of secrets){
    if(!s.sp.visible)continue;
    if(s.d.angleTo(posDir)*R<1.5){s.sp.visible=false;foundSet.add(s.i);
      try{localStorage.setItem(FOUND_KEY,JSON.stringify([...foundSet]));}catch(e){}
      syncFound();if(window.Ambience)Ambience.event('coin');}
  }
  kiosk.getWorldPosition(kw);nearKiosk=kw.distanceTo(avatar.position)<6&&!toolOpen();
  if(nearKiosk&&!wasNear&&window.Ambience)Ambience.event(T.chime); // the counter notices you
  wasNear=nearKiosk;
  promptEl.classList.toggle('on',nearKiosk);
  // adaptive degrade: if frame rate sags on a machine the heuristic missed, shed bloom + dpr once
  if(!degraded&&t>6){fpsAcc+=dt;fpsN++;
    if(fpsN>=90){const fps=fpsN/fpsAcc;if(fps<38){degraded=true;composer=null;renderer.setPixelRatio(1);}fpsAcc=0;fpsN=0;}}
  if(composer)composer.render();else renderer.render(scene,camera);
  if(!firstFrame){firstFrame=true;document.getElementById('loading').classList.add('gone');
    document.getElementById('fallback').classList.remove('on');} // retract the watchdog if vendor fetches were just slow
  requestAnimationFrame(animate);}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);if(composer)composer.setSize(W,H);propMat.uniforms.uScale.value=PSCALE();});

// hand-edited hash → reload re-runs theme routing/validation (in-app navs are full loads anyway)
addEventListener('hashchange',()=>location.reload());

// test/debug handle
window.__world={key:worldKey,posDir:()=>posDir.toArray(),nearKiosk:()=>nearKiosk,openTool,theme:{pixel:T.pixel,terrace:T.terrace},residents:()=>residents.map(r=>r.state),secrets:()=>[...foundSet],fluent:!!FLUENT};
}
</script>
